name: Forbid getCollection in pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  forbid-getcollection:
    name: Prevent getCollection() in src/pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fail if getCollection used inside src/pages
        run: |
          set -e
          # Search for literal "getCollection(" in src/pages; fail the job if any matches are found.
          if git grep -n 'getCollection(' -- src/pages >/dev/null 2>&1; then
            echo "ERROR: getCollection() was found in src/pages. Use import.meta.glob() in getStaticPaths instead."
            git --no-pager grep -n 'getCollection(' -- src/pages || true
            exit 1
          else
            echo "No getCollection() usages found in src/pages."
          fi
