# Nginx configuration for local setup
# Add this to your main nginx.conf or include it as a separate site

server {
    listen 80;
    server_name ephergent.local localhost;  # Change to your preferred domain

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Rate limiting (optional - adjust zones as needed for your main nginx.conf)
    # limit_req zone=api burst=20 nodelay;

    # Proxy to the Flask app running in Docker on port 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Handle WebSocket upgrades if needed
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:5000/api/health;
    }

    # Static file serving (optional - you could serve directly from Docker volumes)
    # Adjust paths to match your Docker volume mounts if you want nginx to serve static files
    location /static/generated_images/ {
        # Example path - adjust based on where Docker volumes are mounted on host
        # alias /var/lib/docker/volumes/ephergent_season_03_generator_generated_images/_data/;
        # Or proxy to Flask app to serve them:
        proxy_pass http://127.0.0.1:5000;
    }

    location /static/generated_audio/ {
        proxy_pass http://127.0.0.1:5000;
    }

    location /static/generated_videos/ {
        proxy_pass http://127.0.0.1:5000;
    }
}