# Grafana Security Configuration for Iframe Embedding
#
# This configuration file allows the Ephergent admin portal to embed
# Grafana dashboards in iframes without X-Frame-Options blocking.
#
# DEPLOYMENT INSTRUCTIONS:
# ------------------------
# Option 1: Append to /etc/grafana/grafana.ini
#   sudo cat monitoring/grafana-security.ini >> /etc/grafana/grafana.ini
#   sudo systemctl restart grafana-server
#
# Option 2: Create override file (recommended)
#   sudo mkdir -p /etc/grafana/provisioning/config
#   sudo cp monitoring/grafana-security.ini /etc/grafana/provisioning/config/security.ini
#   sudo chown grafana:grafana /etc/grafana/provisioning/config/security.ini
#   sudo systemctl restart grafana-server
#
# Option 3: Environment variables (Docker/container deployments)
#   GF_SECURITY_ALLOW_EMBEDDING=true
#   GF_SECURITY_COOKIE_SAMESITE=none
#   GF_SECURITY_COOKIE_SECURE=false

[security]
# Allow Grafana dashboards to be embedded in iframes
# This is required for the admin portal to display dashboards
allow_embedding = true

# Cookie SameSite policy
# Set to 'none' to allow cross-origin iframe embedding
# Set to 'lax' for same-origin only
# For production with HTTPS, use 'none' with cookie_secure = true
cookie_samesite = lax

# Cookie secure flag
# Set to true when using HTTPS in production
# Set to false for HTTP development environments
cookie_secure = false

[auth.anonymous]
# Optional: Enable anonymous access for read-only dashboard viewing
# Uncomment these lines if you want public dashboard access without login
# enabled = true
# org_name = Main Org.
# org_role = Viewer

[server]
# Optional: Set root URL if Grafana is behind a reverse proxy
# Uncomment and update if accessing via http://yourhost/grafana/
# root_url = %(protocol)s://%(domain)s:%(http_port)s/grafana/
# serve_from_sub_path = true
