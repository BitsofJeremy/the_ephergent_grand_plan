# Prometheus Alert Rules for Ephergent Story Generator
# Deploy this file to /etc/prometheus/rules/ephergent-alerts.yml on the VM

groups:
  - name: ephergent_application_alerts
    interval: 30s
    rules:
      # Critical: Application is down
      - alert: EphergentApplicationDown
        expr: up{job="ephergent_app"} == 0
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Ephergent application is down"
          description: "The Ephergent Flask application has been unavailable for more than 2 minutes."

      # High error rate in story generation
      - alert: HighStoryFailureRate
        expr: |
          (
            rate(ephergent_workflow_steps_failed_total[5m])
            /
            (rate(ephergent_workflow_steps_completed_total[5m]) + rate(ephergent_workflow_steps_failed_total[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          component: workflow
        annotations:
          summary: "High story generation failure rate"
          description: "More than 10% of workflow steps are failing in the last 5 minutes."

      # Queue is backing up
      - alert: StoryQueueBacklog
        expr: ephergent_story_queue_size{status="pending"} > 50
        for: 10m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Story queue backlog is high"
          description: "There are {{ $value }} stories pending in the queue for more than 10 minutes."

      # Dead letter queue has items
      - alert: StoriesInDeadLetterQueue
        expr: ephergent_story_queue_size{status="failed"} > 0
        for: 5m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "Stories in dead letter queue"
          description: "{{ $value }} stories are in the failed/dead letter queue and need manual intervention."

      # Slow workflow step performance
      - alert: SlowWorkflowSteps
        expr: |
          histogram_quantile(0.95,
            rate(ephergent_workflow_step_duration_seconds_bucket[5m])
          ) > 600
        for: 10m
        labels:
          severity: warning
          component: workflow
        annotations:
          summary: "Workflow steps are running slowly"
          description: "95th percentile of workflow step duration is above 10 minutes."

  - name: ephergent_infrastructure_alerts
    interval: 30s
    rules:
      # Database connection issues
      - alert: DatabaseConnectionFailure
        expr: ephergent_external_service_available{service="database"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection failure"
          description: "Cannot connect to PostgreSQL database."

      # External service unavailable
      - alert: ExternalServiceDown
        expr: ephergent_external_service_available{service=~"gemini|comfyui|youtube|ghost"} == 0
        for: 5m
        labels:
          severity: warning
          component: external_services
        annotations:
          summary: "External service {{ $labels.service }} is down"
          description: "{{ $labels.service }} service has been unavailable for more than 5 minutes."

      # High HTTP error rate
      - alert: HighHTTPErrorRate
        expr: |
          (
            sum(rate(ephergent_http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(ephergent_http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of HTTP requests are returning 5xx errors."

      # High request latency
      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.95,
            rate(ephergent_http_request_duration_seconds_bucket[5m])
          ) > 5
        for: 10m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "High HTTP request latency"
          description: "95th percentile request latency is above 5 seconds."

  - name: ephergent_worker_alerts
    interval: 30s
    rules:
      # Worker hasn't reported heartbeat
      - alert: WorkerHeartbeatMissing
        expr: |
          (time() - ephergent_worker_heartbeat_timestamp) > 300
        for: 5m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "Worker {{ $labels.worker_id }} heartbeat missing"
          description: "Worker has not reported heartbeat for more than 5 minutes."

      # No workers are processing tasks
      - alert: NoActiveWorkers
        expr: |
          count(ephergent_worker_heartbeat_timestamp) < 1
          and
          ephergent_story_queue_size{status="pending"} > 0
        for: 5m
        labels:
          severity: critical
          component: worker
        annotations:
          summary: "No active workers available"
          description: "No workers are active but there are {{ $value }} pending stories in the queue."

  - name: ephergent_system_health
    interval: 1m
    rules:
      # System-wide health check
      - alert: SystemDegraded
        expr: |
          count(ephergent_external_service_available == 0) > 2
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "System health is degraded"
          description: "Multiple services ({{ $value }}) are unavailable."

      # Memory usage (requires node_exporter)
      - alert: HighMemoryUsage
        expr: |
          (
            node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
          ) / node_memory_MemTotal_bytes > 0.90
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage on VM"
          description: "Memory usage is above 90% ({{ $value | humanizePercentage }})."

      # Disk usage (requires node_exporter)
      - alert: HighDiskUsage
        expr: |
          (
            node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"}
          ) / node_filesystem_size_bytes{mountpoint="/"} > 0.85
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High disk usage on root filesystem"
          description: "Disk usage on / is above 85% ({{ $value | humanizePercentage }})."
