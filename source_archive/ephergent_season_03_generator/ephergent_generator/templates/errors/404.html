{% extends "base.html" %}

{% block title %}Page Not Found - {{ super() }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="error-page">
                <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
                <h1 class="display-3 fw-bold text-primary">404</h1>
                <h3 class="mb-3">Page Not Found</h3>
                <p class="lead mb-4">
                    The page you're looking for seems to have vanished into thin air, 
                    just like a good story plot twist!
                </p>
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Return Home
                </a>
                <a href="{{ url_for('main.generate') }}" class="btn btn-outline-primary ms-2">
                    <i class="bi bi-magic"></i> Generate a Story
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
