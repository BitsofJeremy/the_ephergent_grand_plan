{% extends "base.html" %}

{% block title %}Server Error - {{ super() }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="error-page">
                <i class="bi bi-exclamation-circle display-1 text-danger"></i>
                <h1 class="display-3 fw-bold text-primary">500</h1>
                <h3 class="mb-3">Server Error</h3>
                <p class="lead mb-4">
                    Something went wrong on our end. Don't worry, our AI is probably 
                    just having a creative block. Please try again in a moment.
                </p>
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Return Home
                </a>
                <a href="{{ url_for('main.generate') }}" class="btn btn-outline-primary ms-2">
                    <i class="bi bi-arrow-clockwise"></i> Try Again
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
